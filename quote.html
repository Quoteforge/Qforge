<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QForge - View Quote</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{--red:#E63946;--red-light:rgba(230,57,70,0.08);--dark:#1a1a1a;--white:#ffffff;--border:#e0e0e0;--beige:#f8f7f5;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f5f5;font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;padding:20px;}
.loading{text-align:center;padding:40px;color:#999;font-size:1.1rem;}
.error{background:#fee;border:1px solid #fcc;color:#c33;padding:20px;border-radius:8px;margin:20px auto;max-width:800px;}
.doc-container{background:var(--white);width:100%;max-width:800px;margin:0 auto;border-radius:8px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.1);}
.doc-header{padding:24px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:3px solid var(--red);gap:24px;}
.header-left{display:flex;align-items:flex-start;gap:20px;flex:1;min-width:0;}
.doc-logo{max-height:70px;max-width:140px;object-fit:contain;border-radius:4px;}
.logo-placeholder{width:70px;height:70px;background:#f0f0f0;border:2px dashed #ccc;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#ccc;}
.company-info{font-size:0.75rem;}
.company-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:0.95rem;font-weight:800;color:var(--dark);margin-bottom:2px;}
.company-line{font-size:0.68rem;color:#666;margin:2px 0;line-height:1.3;}
.company-line strong{color:var(--dark);font-weight:600;}
.header-right{text-align:right;flex-shrink:0;}
.doc-type{font-size:0.50rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#999;margin-bottom:4px;}
.doc-number{font-family:'Plus Jakarta Sans',sans-serif;font-size:0.85rem;font-weight:700;color:var(--red);letter-spacing:0.5px;}
.doc-date{font-size:0.65rem;color:#666;margin-top:8px;line-height:1.3;}
.info-band{display:grid;grid-template-columns:1fr 1fr;background:var(--beige);border-bottom:1px solid #eee;gap:0;}
.info-col{padding:16px 20px;border-left:4px solid var(--red);border-right:1px solid #eee;}
.info-col:last-child{border-right:none;}
.info-label{font-size:0.50rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--red);margin-bottom:4px;display:block;}
.client-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:0.85rem;font-weight:700;color:var(--dark);}
.client-detail{font-size:0.65rem;color:#666;margin-top:2px;line-height:1.4;}
.items-section{background:var(--beige);padding:0;}
.items-table{width:100%;border-collapse:collapse;background:var(--white);}
.items-table th{background:var(--dark);color:#fff;font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:10px 16px;text-align:left;}
.items-table th:nth-child(2){text-align:center;width:50px;}
.items-table th:nth-child(3){text-align:right;width:90px;}
.items-table th:nth-child(4){text-align:right;width:90px;padding-right:16px;}
.items-table td{padding:10px 16px;font-size:0.68rem;border-bottom:1px solid #f5f5f5;color:#333;}
.items-table td:nth-child(2){text-align:center;color:#999;}
.items-table td:nth-child(3){text-align:right;}
.items-table td:nth-child(4){text-align:right;font-weight:600;}
.items-table tr:last-child td{border-bottom:none;}
.item-desc{font-size:0.60rem;color:#999;margin-top:2px;}
.totals-section{background:rgba(230,57,70,0.08);padding:12px 20px;display:flex;flex-direction:column;align-items:flex-end;gap:4px;border-top:1px solid #eee;}
.totals-row{display:flex;gap:32px;font-size:0.72rem;color:#666;min-width:250px;justify-content:space-between;}
.totals-row span:last-child{font-weight:600;text-align:right;min-width:80px;}
.totals-row.total{font-family:'Plus Jakarta Sans',sans-serif;font-size:0.85rem;font-weight:700;color:var(--dark);border-top:2px solid #111;padding-top:6px;margin-top:2px;}
.totals-row.total span:last-child{color:var(--red);}
.banking-section{background:var(--beige);border-top:1px solid #eee;padding:10px 20px;}
.banking-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:0.58rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--red);margin-bottom:4px;}
.banking-line{font-size:0.68rem;color:#666;line-height:1.3;margin-bottom:1px;}
.banking-line strong{color:var(--dark);font-weight:600;}
.doc-footer{background:var(--dark);color:#fff;padding:12px 20px;font-size:0.72rem;line-height:1.5;display:flex;justify-content:space-between;gap:20px;}
.footer-left{flex:1;}
.footer-right{text-align:right;flex-shrink:0;font-size:0.65rem;color:#999;}
.signature-section{padding:20px;border-top:1px solid #eee;display:grid;grid-template-columns:1fr 1fr;gap:32px;}
.sig-field{padding:8px 0;}
.sig-line{border-bottom:1px solid #333;height:35px;margin-bottom:8px;}
.sig-label{font-size:0.58rem;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:0.08em;}
.print-btn{margin:20px auto;display:block;padding:12px 32px;background:var(--red);color:white;border:none;border-radius:6px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;cursor:pointer;font-size:0.95rem;transition:background 0.2s;}
.print-btn:hover{background:#c41e3a;}
.sign-wrap{background:var(--white);width:100%;max-width:800px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.1);padding:28px;margin:20px auto;border:1px solid #f0f0f0;}
.sign-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.3rem;font-weight:800;color:var(--dark);margin-bottom:8px;}
.sign-sub{font-size:0.85rem;color:#666;margin-bottom:20px;line-height:1.6;}
.sign-label{font-size:0.75rem;font-weight:700;color:var(--dark);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;display:block;margin-top:16px;}
#signerName{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:6px;font-size:0.9rem;margin-bottom:20px;font-family:'Plus Jakarta Sans',sans-serif;background:var(--white);transition:all 0.2s;}
#signerName:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px var(--red-light);}
#signatureCanvas{width:100%;height:160px;border:2px solid var(--border);border-radius:6px;cursor:crosshair;background:var(--white);display:block;touch-action:none;transition:all 0.2s;margin-bottom:16px;}
#signatureCanvas:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px var(--red-light);}
.sign-buttons{display:flex;gap:12px;justify-content:flex-end;margin-top:20px;}
.btn-primary{padding:12px 28px;background:var(--red);color:white;border:none;border-radius:6px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;cursor:pointer;font-size:0.9rem;transition:background 0.2s;}
.btn-primary:hover{background:#c41e3a;}
.btn-secondary{padding:12px 28px;background:#f0f0f0;color:var(--dark);border:1px solid var(--border);border-radius:6px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;cursor:pointer;font-size:0.9rem;transition:all 0.2s;}
.btn-secondary:hover{background:#e8e8e8;}
@media print{body{padding:0;background:white;}.doc-container{border-radius:0;box-shadow:none;}.sign-wrap{display:none;}}
@media (max-width:640px){body{padding:12px;}.doc-header{padding:12px 10px;gap:6px;flex-wrap:nowrap;align-items:flex-start;}.header-left{gap:8px;min-width:0;}.doc-logo{max-height:40px;max-width:70px;flex-shrink:0;}.logo-placeholder{width:40px;height:40px;font-size:1.1rem;flex-shrink:0;}.company-info{font-size:0.60rem;overflow:hidden;text-overflow:ellipsis;}.company-name{font-size:0.72rem;}.company-line{font-size:0.52rem;margin:0.5px 0;line-height:1.1;}.header-right{text-align:right;flex-shrink:0;white-space:nowrap;min-width:60px;}.doc-type{font-size:0.38rem;margin-bottom:2px;}.doc-number{font-size:0.60rem;line-height:1;}.doc-date{font-size:0.48rem;margin-top:2px;line-height:1.1;}.info-col{padding:10px 12px;border-left:3px solid var(--red);}.info-label{font-size:0.40rem;margin-bottom:2px;}.client-name{font-size:0.70rem;}.client-detail{font-size:0.53rem;line-height:1.3;}.items-table th{font-size:0.48rem;padding:7px 9px;}.items-table th:nth-child(2){width:32px;}.items-table th:nth-child(3){width:60px;}.items-table th:nth-child(4){width:60px;padding-right:9px;}.items-table td{padding:7px 9px;font-size:0.58rem;}.item-desc{font-size:0.50rem;}.totals-section{padding:10px 12px;gap:2px;}.totals-row{gap:16px;font-size:0.60rem;min-width:160px;}.totals-row.total{font-size:0.70rem;padding-top:3px;}.banking-section{padding:8px 12px;}.banking-title{font-size:0.48rem;margin-bottom:2px;}.banking-line{font-size:0.57rem;margin-bottom:1px;line-height:1.2;}.doc-footer{padding:10px 12px;font-size:0.60rem;gap:6px;}.footer-right{font-size:0.52rem;}.signature-section{padding:14px;gap:12px;}.sig-line{height:28px;margin-bottom:5px;}.sig-label{font-size:0.48rem;}.print-btn{margin:10px auto;padding:9px 20px;font-size:0.80rem;}.sign-wrap{padding:16px;margin:12px auto;}.sign-title{font-size:1.0rem;}.sign-sub{font-size:0.75rem;}.sign-label{font-size:0.65rem;margin-top:12px;}#signerName{padding:10px 12px;font-size:0.85rem;margin-bottom:12px;}#signatureCanvas{height:120px;margin-bottom:12px;}.sign-buttons{gap:8px;}.btn-primary,.btn-secondary{padding:10px 16px;font-size:0.8rem;}}
</style>
</head>
<body>

<div id="loadingDiv" class="loading">Loading quote...</div>
<div id="errorDiv" style="display:none;" class="error"></div>
<div id="quoteDiv" style="display:none;"></div>

<script>
const { createClient } = supabase;
const sb = createClient('https://blfhvkbjfhhjsnobvfct.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsZmh2a2JqZmhoanNub2J2ZmN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNjA4MjIsImV4cCI6MjA5NTgzNjgyMn0.w0CUm6N52U8OIYWqrpu84QfeFUm1TYpcpTVKCxCl-YM');

let quoteData = null;
let userData = null;

function formatDate(dateStr) {
  if (!dateStr) return '';
  return new Date(dateStr).toLocaleDateString('en-ZA');
}

// Extract quote number from composite ID: "userId|QUA-001" → "QUA-001"
function extractQuoteNumber(compositeId) {
  if (!compositeId) return compositeId;
  return compositeId.includes('|') ? compositeId.split('|')[1] : compositeId;
}

function hexToRGB(hex) {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? [parseInt(result[1],16), parseInt(result[2],16), parseInt(result[3],16)] : [230, 57, 70];
}

function applyBrandColor(hexColor) {
  document.documentElement.style.setProperty('--red', hexColor);
  const rgb = hexToRGB(hexColor);
  document.documentElement.style.setProperty('--red-light', `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0.08)`);
  const darker = `rgb(${Math.floor(rgb[0] * 0.85)}, ${Math.floor(rgb[1] * 0.85)}, ${Math.floor(rgb[2] * 0.85)})`;
  document.documentElement.style.setProperty('--red-dark', darker);
}

function getVehicleHTML() {
  if (!quoteData) return '';
  let html = '<span class="info-label">Vehicle Details</span><div class="client-detail">';
  if (quoteData.vehicle_vin) html += '<strong>VIN:</strong> ' + quoteData.vehicle_vin + '<br>';
  if (quoteData.vehicle_reg_no) html += '<strong>Reg:</strong> ' + quoteData.vehicle_reg_no + '<br>';
  if (quoteData.vehicle_km) html += '<strong>KM:</strong> ' + quoteData.vehicle_km.toLocaleString() + '<br>';
  if (quoteData.vehicle_model) html += '<strong>Make/Model:</strong> ' + quoteData.vehicle_model + '<br>';
  if (quoteData.vehicle_engine_type) html += '<strong>Engine:</strong> ' + quoteData.vehicle_engine_type;
  html += '</div>';
  return html;
}

function getItemsHTML() {
  let html = '';
  (quoteData.items || []).forEach(item => {
    const amount = (item.qty || 0) * (item.price || 0);
    html += '<tr><td><div>' + (item.name || '') + '</div>';
    if (item.desc) html += '<div class="item-desc">' + item.desc + '</div>';
    html += '</td><td>' + (item.qty || 0) + '</td><td>R' + (item.price || 0).toFixed(2) + '</td><td>R' + amount.toFixed(2) + '</td></tr>';
  });
  return html;
}

function getBankingHTML() {
  if (!userData || !userData.bank_name) return '';
  let html = '<div class="banking-section"><div class="banking-title">' + (userData.company || 'COMPANY') + '</div>';
  html += '<div class="banking-line">' + userData.bank_name + '</div>';
  if (userData.bank_account) html += '<div class="banking-line"><strong>Account Nr:</strong> ' + userData.bank_account + '</div>';
  if (userData.bank_branch) html += '<div class="banking-line"><strong>Branch Code:</strong> ' + userData.bank_branch + '</div>';
  html += '</div>';
  return html;
}

function renderQuote() {
  if (!quoteData) return;

  let html = '<div class="doc-container"><div class="doc-header"><div class="header-left"><div class="logo-placeholder">🏢</div><div class="company-info">';
  html += '<div class="company-name">' + (userData?.company || 'Company') + '</div>';
  html += '<div class="company-line"><strong>' + (userData?.owner_name || 'Owner') + ':</strong> ' + (userData?.phone || '') + '</div>';
  html += '<div class="company-line"><strong>Email:</strong> ' + (userData?.email || '') + '</div>';
  html += '<div class="company-line">' + (userData?.street || '') + ' ' + (userData?.area || '') + '</div>';
  html += '<div class="company-line">' + (userData?.city || '') + ', ' + (userData?.province || '') + '</div>';
  if (userData?.reg_number) html += '<div class="company-line"><strong>Reg nr:</strong> ' + userData.reg_number + '</div>';
  if (userData?.vat_number) html += '<div class="company-line"><strong>VAT:</strong> ' + userData.vat_number + '</div>';
  html += '</div></div><div class="header-right"><div class="doc-type">Quotation</div><div class="doc-number">' + extractQuoteNumber(quoteData.id) + '</div>';
  html += '<div class="doc-date"><strong>Date:</strong> ' + formatDate(quoteData.date) + '<br><strong>Valid for:</strong> ' + (quoteData.valid_days || 14) + ' days</div></div></div>';
  
  html += '<div class="info-band"><div class="info-col"><span class="info-label">Quoted For</span><div class="client-name">' + (quoteData.client || '') + '</div>';
  html += '<div class="client-detail">' + (quoteData.contact || '') + '<br>' + (quoteData.address || '') + '<br>';
  html += '<strong style="margin-top:4px;display:block;">Ref Quote: ' + extractQuoteNumber(quoteData.id) + '</strong></div></div>';
  html += '<div class="info-col">' + getVehicleHTML() + '</div></div>';
  
  html += '<div class="items-section"><table class="items-table"><thead><tr><th>Description</th><th>QTY</th><th>Unit Price</th><th>Amount</th></tr></thead><tbody>';
  html += getItemsHTML();
  html += '</tbody></table></div>';
  
  html += '<div class="totals-section"><div class="totals-row"><span>Sub Total</span><span>R' + (quoteData.subtotal || 0).toFixed(2) + '</span></div>';
  if (quoteData.vat_registered) html += '<div class="totals-row"><span>VAT:</span><span>R' + (quoteData.vat || 0).toFixed(2) + '</span></div>';
  html += '<div class="totals-row total"><span>Total Due</span><span>R' + (quoteData.amount || 0).toFixed(2) + '</span></div></div>';
  
  html += getBankingHTML();
  
  html += '<div class="doc-footer"><div class="footer-left">Thank you for your business. Payment is due within 30 days.<br>';
  if (quoteData.deposit) html += '<strong style="margin-top:4px;display:block;">Deposit: ' + quoteData.deposit + ' required on acceptance. Balance due on completion</strong>';
  html += '</div><div class="footer-right">Powered by QForge | myquoteforge.co.za</div></div>';
  
  html += '<div class="signature-section"><div class="sig-field"><div class="sig-line"></div><div class="sig-label">Client Signature & Date</div></div>';
  html += '<div class="sig-field"><div class="sig-line"></div><div class="sig-label">Authorised Signatory</div></div></div></div>';
  
  html += '<button class="print-btn" onclick="window.print()">🖨️ Print / Save as PDF</button>';
  html += '<div class="sign-wrap"><div class="sign-title">Accept This Quotation</div>';
  html += '<div class="sign-sub">Please provide your name and signature below to accept this quotation.</div>';
  html += '<label class="sign-label">Your Name</label><input type="text" id="signerName" placeholder="Enter your full name" />';
  html += '<label class="sign-label">Your Signature</label><canvas id="signatureCanvas"></canvas>';
  html += '<div class="sign-buttons"><button class="btn-secondary" onclick="clearSignature()">Clear Signature</button>';
  html += '<button class="btn-primary" onclick="acceptQuote()">Accept & Sign</button></div></div>';

  document.getElementById('quoteDiv').innerHTML = html;
  document.getElementById('loadingDiv').style.display = 'none';
  document.getElementById('quoteDiv').style.display = 'block';
  
  setupSignatureCanvas();
}

function setupSignatureCanvas() {
  const canvas = document.getElementById('signatureCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = 160;
  
  let isDrawing = false;
  canvas.addEventListener('mousedown', () => isDrawing = true);
  canvas.addEventListener('mouseup', () => isDrawing = false);
  canvas.addEventListener('mousemove', (e) => {
    if(!isDrawing) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#333';
    ctx.lineTo(x, y);
    ctx.stroke();
  });
}

function clearSignature() {
  const canvas = document.getElementById('signatureCanvas');
  if(canvas) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

function acceptQuote() {
  const name = document.getElementById('signerName').value.trim();
  if(!name) {
    alert('Please enter your name');
    return;
  }
  alert('Quotation accepted by ' + name + '!');
}

async function loadQuote() {
  const params = new URLSearchParams(window.location.search);
  const quoteId = params.get('id');
  
  if (!quoteId) {
    document.getElementById('loadingDiv').style.display = 'none';
    document.getElementById('errorDiv').textContent = 'No quote ID provided';
    document.getElementById('errorDiv').style.display = 'block';
    return;
  }

  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user?.id) {
      const { data } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
      if (data) userData = data;
    }

    // Try direct ID first (for backward compatibility)
    let { data, error } = await sb.from('quotes').select('*').eq('id', quoteId).single();
    
    // If not found and ID doesn't contain pipe, search for quotes containing this number
    if ((error || !data) && !quoteId.includes('|')) {
      // Search for any quote where the ID ends with the provided quote number
      // This handles composite IDs like "userId|QUA-001" when searching for "QUA-001"
      const { data: allData } = await sb.from('quotes').select('*');
      if (allData) {
        data = allData.find(q => q.id && q.id.endsWith('|' + quoteId));
      }
    }
    
    if (!data) {
      throw new Error('Quote not found');
    }

    quoteData = data;
    
    // Try to fetch the quote creator's profile to get their brand color
    try {
      if (quoteData.user_id) {
        const { data: creatorProfile } = await sb.from('profiles').select('brand_color').eq('id', quoteData.user_id).single();
        if (creatorProfile?.brand_color) {
          applyBrandColor(creatorProfile.brand_color);
        } else {
          applyBrandColor('#E63946'); // Default red
        }
      } else {
        applyBrandColor('#E63946'); // Default red
      }
    } catch (err) {
      console.log('Profile fetch error (OK to ignore):', err.message);
      applyBrandColor('#E63946'); // Default red on error
    }
    
    renderQuote();
  } catch (err) {
    document.getElementById('loadingDiv').style.display = 'none';
    document.getElementById('errorDiv').textContent = 'Error: ' + err.message;
    document.getElementById('errorDiv').style.display = 'block';
  }
}

loadQuote();
</script>

</body>
</html>
