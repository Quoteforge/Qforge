<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E63946">
<title>Invoice - QForge</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', -apple-system, sans-serif; background: #f5f5f5; color: #333; }
.container { max-width: 900px; margin: 0 auto; padding: 20px; }
.header { background: white; padding: 20px; border-bottom: 3px solid #E63946; margin-bottom: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 1.5rem; color: #1a1a1a; }
.btn { background: #E63946; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
.btn:hover { background: #C41E3A; }
.invoice-document { background: white; padding: 40px; border-radius: 8px; border: 1px solid #ddd; }
.pdf-header { background: #1a1a1a; color: white; padding: 20px; margin: -40px -40px 20px; display: flex; justify-content: space-between; border-radius: 8px 8px 0 0; }
.header-left { flex: 1; }
.company-name { font-weight: bold; font-size: 1.1rem; margin-bottom: 4px; }
.company-desc { font-size: 0.8rem; color: #999; }
.header-right { text-align: right; }
.invoice-label { font-size: 0.7rem; color: #999; }
.invoice-number { font-size: 1.3rem; color: #E63946; font-weight: bold; margin: 4px 0; }
.invoice-date { font-size: 0.8rem; color: #ccc; }
.client-section { background: #faf9f7; padding: 12px; margin: 20px 0; border-left: 3px solid #E63946; }
.client-title { font-size: 0.7rem; color: #999; font-weight: bold; margin-bottom: 4px; }
.client-name { font-weight: 600; margin-bottom: 4px; }
.client-info { font-size: 0.9rem; color: #666; }
.items-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
.items-table th { background: #1a1a1a; color: white; padding: 12px; text-align: left; font-weight: bold; font-size: 0.9rem; }
.items-table td { padding: 12px; border-bottom: 1px solid #eee; }
.items-table tr:nth-child(even) { background: #fafafa; }
.amount-right { text-align: right; }
.totals-section { background: #FEF0F0; padding: 16px; border-radius: 4px; margin: 20px 0; }
.total-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 0.95rem; }
.total-label { font-weight: 600; }
.total-amount { text-align: right; }
.final-total { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 2px solid #E63946; font-weight: bold; font-size: 1.1rem; }
.final-total span:last-child { color: #E63946; }
.due-status { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid #E63946; font-size: 0.9rem; }
.status-badge { display: inline-block; padding: 6px 12px; border-radius: 4px; font-size: 0.85rem; font-weight: 600; }
.status-paid { background: rgba(46, 204, 113, 0.15); color: #2ecc71; }
.status-unpaid { background: rgba(230, 57, 70, 0.15); color: #E63946; }
.status-partial { background: rgba(230, 176, 75, 0.15); color: #e8b84b; }
.footer { text-align: center; padding: 12px; border-top: 1px solid #eee; margin-top: 20px; font-size: 0.8rem; color: #999; }
.actions { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
.btn-secondary { background: white; color: #E63946; border: 2px solid #E63946; }
.btn-secondary:hover { background: #ffebee; }
@media print { 
  body { background: white; } 
  .header, .actions { display: none; } 
  .invoice-document { border: none; padding: 0; }
}
@media (max-width: 600px) {
  .container { padding: 10px; }
  .invoice-document { padding: 20px; }
  .pdf-header { padding: 15px; margin: -20px -20px 15px; }
  .items-table { font-size: 0.85rem; }
  .items-table th, .items-table td { padding: 8px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div><h1>Invoice</h1></div>
    <div style="display: flex; gap: 10px;">
      <button class="btn btn-secondary" onclick="window.print()">🖨️ Print</button>
      <button class="btn btn-secondary" onclick="shareViaWhatsApp()">💬 Share</button>
    </div>
  </div>

  <div class="invoice-document" id="invoiceContent">
    <!-- This will be populated by JavaScript -->
  </div>

  <div class="actions">
    <button class="btn" onclick="window.location.href='/'">← Back to QForge</button>
  </div>
</div>

<script>
// Get invoice ID from URL parameters
const urlParams = new URLSearchParams(window.location.search);
const invoiceId = urlParams.get('id');
const invoiceData = JSON.parse(urlParams.get('data') || '{}');

if (Object.keys(invoiceData).length > 0) {
  renderInvoice(invoiceData);
} else {
  document.getElementById('invoiceContent').innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">Invoice data not found. Please share the link again.</p>';
}

function renderInvoice(invoice) {
  const fmt = n => 'R' + parseFloat(n || 0).toLocaleString('en-ZA', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  const invDateStr = new Date(invoice.invoice_date).toLocaleDateString('en-ZA', {day: 'numeric', month: 'long', year: 'numeric'});
  const dueDateStr = new Date(invoice.due_date).toLocaleDateString('en-ZA', {day: 'numeric', month: 'long', year: 'numeric'});
  
  const itemsHtml = (invoice.items || []).map(item => `
    <tr>
      <td>${item.description || 'Item'}</td>
      <td class="amount-right">${item.qty || 1}</td>
      <td class="amount-right">${fmt(item.price || 0)}</td>
      <td class="amount-right" style="font-weight: bold;">${fmt((item.qty || 1) * (item.price || 0))}</td>
    </tr>
  `).join('');

  const statusClass = `status-${invoice.status || 'unpaid'}`;
  const statusText = (invoice.status || 'unpaid').toUpperCase();

  const html = `
    <div class="pdf-header">
      <div class="header-left">
        <div class="company-name">${invoice.company || 'QForge'}</div>
        <div class="company-desc">Professional Services</div>
      </div>
      <div class="header-right">
        <div class="invoice-label">INVOICE</div>
        <div class="invoice-number">${invoice.invoice_number || 'INV-001'}</div>
        <div class="invoice-date">${invDateStr}</div>
      </div>
    </div>

    <div class="client-section">
      <div class="client-title">INVOICE TO</div>
      <div class="client-name">${invoice.client_name || 'Client'}</div>
      ${invoice.client_phone || invoice.client_address ? `
        <div class="client-info">
          ${[invoice.client_phone, invoice.client_address].filter(Boolean).join(' • ')}
        </div>
      ` : ''}
    </div>

    <table class="items-table">
      <thead>
        <tr>
          <th>Description</th>
          <th style="text-align: center;">Qty</th>
          <th class="amount-right">Unit Price</th>
          <th class="amount-right">Amount</th>
        </tr>
      </thead>
      <tbody>
        ${itemsHtml || '<tr><td colspan="4" style="text-align: center; padding: 20px; color: #999;">No items</td></tr>'}
      </tbody>
    </table>

    <div class="totals-section">
      <div class="total-row">
        <span class="total-label">Subtotal:</span>
        <span class="total-amount">${fmt(invoice.subtotal || 0)}</span>
      </div>
      ${invoice.vat_amount > 0 ? `
        <div class="total-row">
          <span class="total-label">VAT @ 15%:</span>
          <span class="total-amount">${fmt(invoice.vat_amount || 0)}</span>
        </div>
      ` : ''}
      <div class="final-total">
        <span>TOTAL DUE</span>
        <span>${fmt(invoice.total_amount || 0)}</span>
      </div>
      <div class="due-status">
        <div><strong>Due: ${dueDateStr}</strong></div>
        <div><span class="status-badge ${statusClass}">${statusText}</span></div>
      </div>
    </div>

    <div class="footer">
      ${invoice.notes ? `<p>${invoice.notes}</p>` : ''}
      <p style="margin-top: 8px;">Thank you for your business.</p>
      <p>Powered by QForge | Professional Invoicing</p>
    </div>
  `;

  document.getElementById('invoiceContent').innerHTML = html;
  document.title = `Invoice ${invoice.invoice_number || 'INV-001'} - QForge`;
}

function shareViaWhatsApp() {
  const phone = new URLSearchParams(window.location.search).get('phone');
  if (!phone) {
    alert('No phone number provided for sharing');
    return;
  }
  
  const invoice = JSON.parse(urlParams.get('data') || '{}');
  const message = `Hi, invoice ${invoice.invoice_number} is ready. Due: ${new Date(invoice.due_date).toLocaleDateString('en-ZA')}. View it here: ${window.location.href}`;
  const url = `https://wa.me/27${phone.slice(-9)}?text=${encodeURIComponent(message)}`;
  window.open(url, '_blank');
}
</script>
</body>
</html>
