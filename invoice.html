<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QForge - View Invoice</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{--red:#E63946;--red-light:rgba(230,57,70,0.08);--dark:#1a1a1a;--white:#ffffff;--border:#e0e0e0;--beige:#f8f7f5;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f5f5;font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;padding:20px;}
.loading{text-align:center;padding:40px;color:#999;font-size:1.1rem;}
.error{background:#fee;border:1px solid #fcc;color:#c33;padding:20px;border-radius:8px;margin:20px auto;max-width:800px;}
.doc-container{background:var(--white);width:100%;max-width:800px;margin:0 auto;border-radius:8px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.1);}
.doc-header{padding:24px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:3px solid var(--red);gap:24px;}
.header-left{display:flex;align-items:flex-start;gap:20px;flex:1;min-width:0;}
.doc-logo{max-height:70px;max-width:140px;object-fit:contain;border-radius:4px;}
.logo-placeholder{width:70px;height:70px;background:#f0f0f0;border:2px dashed #ccc;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#ccc;}
.company-info{font-size:0.75rem;}
.company-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:0.95rem;font-weight:800;color:var(--dark);margin-bottom:2px;}
.company-line{font-size:0.68rem;color:#666;margin:2px 0;line-height:1.3;}
.company-line strong{color:var(--dark);font-weight:600;}
.header-right{text-align:right;flex-shrink:0;}
.doc-type{font-size:0.50rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#999;margin-bottom:4px;}
.doc-number{font-family:'Plus Jakarta Sans',sans-serif;font-size:0.85rem;font-weight:700;color:var(--red);letter-spacing:0.5px;}
.doc-date{font-size:0.65rem;color:#666;margin-top:8px;line-height:1.3;}
.info-band{display:grid;grid-template-columns:1fr 1fr;background:var(--beige);border-bottom:1px solid #eee;gap:0;}
.info-col{padding:16px 20px;border-left:4px solid var(--red);border-right:1px solid #eee;}
.info-col:last-child{border-right:none;}
.info-label{font-size:0.50rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--red);margin-bottom:4px;display:block;}
.client-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:0.85rem;font-weight:700;color:var(--dark);}
.client-detail{font-size:0.65rem;color:#666;margin-top:2px;line-height:1.4;}
.items-section{background:var(--beige);padding:0;}
.items-table{width:100%;border-collapse:collapse;background:var(--white);}
.items-table th{background:var(--dark);color:#fff;font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:10px 16px;text-align:left;}
.items-table th:nth-child(2){text-align:center;width:50px;}
.items-table th:nth-child(3){text-align:right;width:90px;}
.items-table th:nth-child(4){text-align:right;width:90px;padding-right:16px;}
.items-table td{padding:10px 16px;font-size:0.68rem;border-bottom:1px solid #f5f5f5;color:#333;}
.items-table td:nth-child(2){text-align:center;color:#999;}
.items-table td:nth-child(3){text-align:right;}
.items-table td:nth-child(4){text-align:right;font-weight:600;}
.items-table tr:last-child td{border-bottom:none;}
.item-desc{font-size:0.60rem;color:#999;margin-top:2px;}
.totals-section{background:rgba(230,57,70,0.08);padding:12px 20px;display:flex;flex-direction:column;align-items:flex-end;gap:4px;border-top:1px solid #eee;}
.totals-row{display:flex;gap:32px;font-size:0.72rem;color:#666;min-width:250px;justify-content:space-between;}
.totals-row span:last-child{font-weight:600;text-align:right;min-width:80px;}
.totals-row.total{font-family:'Plus Jakarta Sans',sans-serif;font-size:0.85rem;font-weight:700;color:var(--dark);border-top:2px solid #111;padding-top:6px;margin-top:2px;}
.totals-row.total span:last-child{color:var(--red);}
.banking-section{background:var(--beige);border-top:1px solid #eee;padding:10px 20px;}
.banking-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:0.58rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--red);margin-bottom:4px;}
.banking-line{font-size:0.68rem;color:#666;line-height:1.3;margin-bottom:1px;}
.banking-line strong{color:var(--dark);font-weight:600;}
.doc-footer{background:var(--dark);color:#fff;padding:12px 20px;font-size:0.72rem;line-height:1.5;display:flex;justify-content:space-between;gap:20px;}
.footer-left{flex:1;}
.footer-right{text-align:right;flex-shrink:0;font-size:0.65rem;color:#999;}
.signature-section{padding:20px;border-top:1px solid #eee;display:grid;grid-template-columns:1fr 1fr;gap:32px;}
.sig-field{padding:8px 0;}
.sig-line{border-bottom:1px solid #333;height:35px;margin-bottom:8px;}
.sig-label{font-size:0.58rem;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:0.08em;}
.action-buttons{width:100%;max-width:800px;margin:20px auto;padding:0 20px;display:flex;flex-direction:column;gap:12px;}
.btn-pay-now{padding:14px 28px;background:#27ae60;color:white;border:none;border-radius:6px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;cursor:pointer;font-size:0.95rem;transition:background 0.2s;text-align:center;}
.btn-pay-now:hover{background:#229954;}
.btn-save-pdf{padding:14px 28px;background:var(--red);color:white;border:none;border-radius:6px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;cursor:pointer;font-size:0.95rem;transition:background 0.2s;text-align:center;}
.btn-save-pdf:hover{background:#c41e3a;}
@media print{body{padding:0;background:white;}.doc-container{border-radius:0;box-shadow:none;}.action-buttons{display:none;}}
@media (max-width:640px){body{padding:12px;}.doc-header{padding:12px 10px;gap:6px;flex-wrap:nowrap;align-items:flex-start;}.header-left{gap:8px;min-width:0;}.doc-logo{max-height:40px;max-width:70px;flex-shrink:0;}.logo-placeholder{width:40px;height:40px;font-size:1.1rem;flex-shrink:0;}.company-info{font-size:0.60rem;overflow:hidden;text-overflow:ellipsis;}.company-name{font-size:0.72rem;}.company-line{font-size:0.52rem;margin:0.5px 0;line-height:1.1;}.header-right{text-align:right;flex-shrink:0;white-space:nowrap;min-width:60px;}.doc-type{font-size:0.38rem;margin-bottom:2px;}.doc-number{font-size:0.60rem;line-height:1;}.doc-date{font-size:0.48rem;margin-top:2px;line-height:1.1;}.info-col{padding:10px 12px;border-left:3px solid var(--red);}.info-label{font-size:0.40rem;margin-bottom:2px;}.client-name{font-size:0.70rem;}.client-detail{font-size:0.53rem;line-height:1.3;}.items-table th{font-size:0.48rem;padding:7px 9px;}.items-table th:nth-child(2){width:32px;}.items-table th:nth-child(3){width:60px;}.items-table th:nth-child(4){width:60px;padding-right:9px;}.items-table td{padding:7px 9px;font-size:0.58rem;}.item-desc{font-size:0.50rem;}.totals-section{padding:10px 12px;gap:2px;}.totals-row{gap:16px;font-size:0.60rem;min-width:160px;}.totals-row.total{font-size:0.70rem;padding-top:3px;}.banking-section{padding:8px 12px;}.banking-title{font-size:0.48rem;margin-bottom:2px;}.banking-line{font-size:0.57rem;margin-bottom:1px;line-height:1.2;}.doc-footer{padding:10px 12px;font-size:0.60rem;gap:6px;}.footer-right{font-size:0.52rem;}.signature-section{padding:14px;gap:12px;}.sig-line{height:28px;margin-bottom:5px;}.sig-label{font-size:0.48rem;}.action-buttons{max-width:100%;padding:0 12px;gap:10px;}.btn-pay-now,.btn-save-pdf{padding:12px 20px;font-size:0.85rem;}}
</style>
</head>
<body>

<div id="loadingDiv" class="loading">Loading invoice...</div>
<div id="errorDiv" style="display:none;" class="error"></div>
<div id="invoiceDiv" style="display:none;"></div>

<script>
const { createClient } = supabase;
const sb = createClient('https://blfhvkbjfhhjsnobvfct.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsZmh2a2JqZmhoanNub2J2ZmN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNjA4MjIsImV4cCI6MjA5NTgzNjgyMn0.w0CUm6N52U8OIYWqrpu84QfeFUm1TYpcpTVKCxCl-YM');

let invoiceData = null;
let userData = null;

function formatDate(dateStr) {
  if (!dateStr) return '';
  return new Date(dateStr).toLocaleDateString('en-ZA');
}

function getVehicleHTML() {
  if (!invoiceData) return '';
  let html = '<span class="info-label">Vehicle Details</span><div class="client-detail">';
  if (invoiceData.vehicle_vin) html += '<strong>VIN:</strong> ' + invoiceData.vehicle_vin + '<br>';
  if (invoiceData.vehicle_reg_no) html += '<strong>Reg:</strong> ' + invoiceData.vehicle_reg_no + '<br>';
  if (invoiceData.vehicle_km) html += '<strong>KM:</strong> ' + invoiceData.vehicle_km.toLocaleString() + '<br>';
  if (invoiceData.vehicle_model) html += '<strong>Make/Model:</strong> ' + invoiceData.vehicle_model + '<br>';
  if (invoiceData.vehicle_engine_type) html += '<strong>Engine:</strong> ' + invoiceData.vehicle_engine_type;
  html += '</div>';
  return html;
}

function getItemsHTML() {
  let html = '';
  (invoiceData.items || []).forEach(item => {
    const amount = (item.qty || 0) * (item.price || 0);
    html += '<tr><td><div>' + (item.name || '') + '</div>';
    if (item.desc) html += '<div class="item-desc">' + item.desc + '</div>';
    html += '</td><td>' + (item.qty || 0) + '</td><td>R' + (item.price || 0).toFixed(2) + '</td><td>R' + amount.toFixed(2) + '</td></tr>';
  });
  return html;
}

function getBankingHTML() {
  if (!userData || !userData.bank_name) return '';
  let html = '<div class="banking-section"><div class="banking-title">' + (userData.company || 'COMPANY') + '</div>';
  html += '<div class="banking-line">' + userData.bank_name + '</div>';
  if (userData.bank_account) html += '<div class="banking-line"><strong>Account Nr:</strong> ' + userData.bank_account + '</div>';
  if (userData.bank_branch) html += '<div class="banking-line"><strong>Branch Code:</strong> ' + userData.bank_branch + '</div>';
  html += '</div>';
  return html;
}

function renderInvoice() {
  if (!invoiceData) return;

  let html = '<div class="doc-container"><div class="doc-header"><div class="header-left"><div class="logo-placeholder">🏢</div><div class="company-info">';
  html += '<div class="company-name">' + (userData?.company || 'Company') + '</div>';
  html += '<div class="company-line"><strong>' + (userData?.owner_name || 'Owner') + ':</strong> ' + (userData?.phone || '') + '</div>';
  html += '<div class="company-line"><strong>Email:</strong> ' + (userData?.email || '') + '</div>';
  html += '<div class="company-line">' + (userData?.street || '') + ' ' + (userData?.area || '') + '</div>';
  html += '<div class="company-line">' + (userData?.city || '') + ', ' + (userData?.province || '') + '</div>';
  if (userData?.reg_number) html += '<div class="company-line"><strong>Reg nr:</strong> ' + userData.reg_number + '</div>';
  if (userData?.vat_number) html += '<div class="company-line"><strong>VAT:</strong> ' + userData.vat_number + '</div>';
  html += '</div></div><div class="header-right"><div class="doc-type">Tax Invoice</div><div class="doc-number">' + invoiceData.id + '</div>';
  html += '<div class="doc-date"><strong>Date:</strong> ' + formatDate(invoiceData.date) + '<br><strong>Due:</strong> ' + formatDate(invoiceData.date) + '</div></div></div>';
  
  html += '<div class="info-band"><div class="info-col"><span class="info-label">Invoice to</span><div class="client-name">' + (invoiceData.client || '') + '</div>';
  html += '<div class="client-detail">' + (invoiceData.contact || '') + '<br>' + (invoiceData.address || '') + '<br>';
  html += '<strong style="margin-top:4px;display:block;">Ref Invoice: ' + invoiceData.id + '</strong></div></div>';
  html += '<div class="info-col">' + getVehicleHTML() + '</div></div>';
  
  html += '<div class="items-section"><table class="items-table"><thead><tr><th>Description</th><th>QTY</th><th>Unit Price</th><th>Amount</th></tr></thead><tbody>';
  html += getItemsHTML();
  html += '</tbody></table></div>';
  
  html += '<div class="totals-section"><div class="totals-row"><span>Sub Total</span><span>R' + (invoiceData.subtotal || 0).toFixed(2) + '</span></div>';
  if (invoiceData.vat_registered) html += '<div class="totals-row"><span>VAT:</span><span>R' + (invoiceData.vat || 0).toFixed(2) + '</span></div>';
  html += '<div class="totals-row total"><span>Total Due</span><span>R' + (invoiceData.amount || 0).toFixed(2) + '</span></div></div>';
  
  html += getBankingHTML();
  
  html += '<div class="doc-footer"><div class="footer-left">Thank you for your business. Payment is due within 30 days.<br>';
  if (invoiceData.deposit) html += '<strong style="margin-top:4px;display:block;">Deposit: ' + invoiceData.deposit + ' required on acceptance. Balance due on completion</strong>';
  html += '</div><div class="footer-right">Powered by QForge | myquoteforge.co.za</div></div>';
  
  html += '<div class="signature-section"><div class="sig-field"><div class="sig-line"></div><div class="sig-label">Received in good order</div></div>';
  html += '<div class="sig-field"><div class="sig-line"></div><div class="sig-label">Date</div></div></div></div>';
  
  html += '<div class="action-buttons"><button class="btn-pay-now" onclick="goToPayFast()">💳 Pay Now with PayFast</button>';
  html += '<button class="btn-save-pdf" onclick="window.print()">📄 Save to PDF</button></div>';

  document.getElementById('invoiceDiv').innerHTML = html;
  document.getElementById('loadingDiv').style.display = 'none';
  document.getElementById('invoiceDiv').style.display = 'block';
}

function goToPayFast() {
  const amount = (invoiceData.amount || 0).toFixed(2);
  alert('Redirecting to PayFast payment gateway...\\n\\nAmount: R' + amount);
}

async function loadInvoice() {
  const params = new URLSearchParams(window.location.search);
  const invoiceId = params.get('id');
  
  if (!invoiceId) {
    document.getElementById('loadingDiv').style.display = 'none';
    document.getElementById('errorDiv').textContent = 'No invoice ID provided';
    document.getElementById('errorDiv').style.display = 'block';
    return;
  }

  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user?.id) {
      const { data } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
      if (data) userData = data;
    }

    const { data, error } = await sb.from('quotes').select('*').eq('id', invoiceId).single();
    if (error || !data) {
      throw new Error('Invoice not found');
    }

    invoiceData = data;
    renderInvoice();
  } catch (err) {
    document.getElementById('loadingDiv').style.display = 'none';
    document.getElementById('errorDiv').textContent = 'Error: ' + err.message;
    document.getElementById('errorDiv').style.display = 'block';
  }
}

loadInvoice();
</script>

</body>
</html>
