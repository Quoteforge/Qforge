<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Builder - QForge</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; color: #333; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }
.header { background: white; padding: 20px; border-bottom: 3px solid #E63946; margin-bottom: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 1.8rem; color: #1a1a1a; }
.builder-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.form-section { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; }
.form-title { font-size: 0.75rem; font-weight: 700; color: #E63946; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
.form-group { margin-bottom: 12px; }
.form-group label { font-size: 0.85rem; font-weight: 600; color: #333; display: block; margin-bottom: 4px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; font-family: inherit; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #E63946; box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.1); }
.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.item-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 8px; align-items: flex-end; margin-bottom: 12px; padding: 12px; background: #f9f9f9; border-radius: 6px; }
.item-row input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.85rem; }
.btn { background: #E63946; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: all 0.2s; }
.btn:hover { background: #C41E3A; transform: translateY(-2px); }
.btn-secondary { background: white; color: #E63946; border: 2px solid #E63946; }
.btn-secondary:hover { background: #ffebee; }
.btn-remove { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
.btn-remove:hover { background: #c0392b; }
.btn-small { padding: 8px 12px; font-size: 0.8rem; }
.actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; }
.preview-section { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; max-height: 100vh; overflow-y: auto; }
.preview-pdf { background: #fff; padding: 20px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.8rem; line-height: 1.6; }
.pdf-header { background: #1a1a1a; color: white; padding: 15px; margin: -20px -20px 15px; display: flex; justify-content: space-between; }
.pdf-header-left { flex: 1; }
.pdf-header-right { text-align: right; }
.pdf-title { font-size: 0.6rem; color: #999; }
.pdf-number { font-size: 0.9rem; color: #E63946; font-weight: bold; }
.pdf-client { background: #faf9f7; padding: 10px; margin: 10px 0; border-left: 3px solid #E63946; }
.pdf-client-title { font-size: 0.6rem; color: #999; font-weight: bold; }
.pdf-client-name { font-weight: bold; margin-top: 4px; }
.pdf-items { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 0.75rem; }
.pdf-items th { background: #1a1a1a; color: white; padding: 8px; text-align: left; font-weight: bold; }
.pdf-items td { padding: 8px; border-bottom: 1px solid #ddd; }
.pdf-items tr:nth-child(even) { background: #fafafa; }
.pdf-total { background: #FEF0F0; padding: 10px; margin: 10px 0; text-align: right; }
.total-line { display: flex; justify-content: space-between; margin: 4px 0; }
.toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 20px; border-radius: 6px; color: white; font-weight: 600; z-index: 1000; }
.toast.success { background: #2ecc71; }
.toast.error { background: #e74c3c; }
@media (max-width: 1000px) { .builder-container { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div><h1>Invoice Builder</h1></div>
    <button class="btn btn-secondary" onclick="window.location.href='/'; return false;">← Back</button>
  </div>

  <div class="builder-container">
    <div>
      <div class="form-section">
        <div class="form-title">Client Details</div>
        <div class="form-group">
          <label>Client Name *</label>
          <input type="text" id="clientName" placeholder="e.g. ABC Property">
        </div>
        <div class="input-row">
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="clientPhone" placeholder="011 000 0000">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="clientEmail">
          </div>
        </div>
        <div class="form-group">
          <label>Street Address</label>
          <input type="text" id="clientAddress">
        </div>
      </div>

      <div class="form-section">
        <div class="form-title">Invoice Settings</div>
        <div class="input-row">
          <div class="form-group">
            <label>Invoice Number</label>
            <input type="text" id="invoiceNumber" readonly>
          </div>
          <div class="form-group">
            <label>Invoice Date</label>
            <input type="date" id="invoiceDate">
          </div>
        </div>
        <div class="input-row">
          <div class="form-group">
            <label>Due Date</label>
            <input type="date" id="dueDate">
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="status">
              <option value="unpaid">Unpaid</option>
              <option value="partial">Partial</option>
              <option value="paid">Paid</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>VAT</label>
          <select id="vatStatus">
            <option value="no">Not VAT Registered</option>
            <option value="yes">VAT @ 15%</option>
          </select>
        </div>
        <div class="form-group">
          <label>Notes / Payment Terms</label>
          <textarea id="notes" rows="2" placeholder="e.g. Payment due within 30 days..."></textarea>
        </div>
      </div>

      <div class="form-section">
        <div class="form-title">Line Items</div>
        <div id="itemsList"></div>
        <button class="btn btn-small" onclick="addItem()">+ Add Item</button>
      </div>

      <div class="form-section">
        <div class="form-title">Totals</div>
        <div style="background: white; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
          <div style="display: flex; justify-content: space-between; margin: 4px 0;">
            <span>Subtotal:</span>
            <span id="subtotal">R0.00</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin: 4px 0;">
            <span>VAT:</span>
            <span id="vat">R0.00</span>
          </div>
          <div style="display: flex; justify-content: space-between; font-weight: bold; border-top: 1px solid #ddd; padding-top: 8px; margin-top: 8px;">
            <span>Total Due:</span>
            <span id="total" style="color: #E63946;">R0.00</span>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn" onclick="saveInvoice()">💾 Save</button>
        <button class="btn" onclick="downloadPDF()">📥 PDF</button>
        <button class="btn btn-secondary" onclick="sendWhatsApp()">💬 WhatsApp</button>
      </div>
    </div>

    <div class="preview-section">
      <div class="form-title" style="margin-bottom: 15px;">PDF Preview</div>
      <div class="preview-pdf" id="previewPDF">
        <div class="pdf-header">
          <div class="pdf-header-left">
            <div style="font-weight: bold;">Your Company</div>
          </div>
          <div class="pdf-header-right">
            <div class="pdf-title">INVOICE</div>
            <div class="pdf-number" id="preview-invnum">INV-001</div>
          </div>
        </div>

        <div class="pdf-client">
          <div class="pdf-client-title">Invoice To</div>
          <div class="pdf-client-name" id="preview-client">Client Name</div>
        </div>

        <table class="pdf-items">
          <thead>
            <tr>
              <th style="width: 50%;">Description</th>
              <th style="width: 10%;">Qty</th>
              <th style="width: 20%;">Unit Price</th>
              <th style="width: 20%;">Amount</th>
            </tr>
          </thead>
          <tbody id="preview-items">
            <tr>
              <td colspan="4" style="text-align: center; color: #999; padding: 20px;">Add items</td>
            </tr>
          </tbody>
        </table>

        <div class="pdf-total">
          <div style="display: flex; justify-content: space-between;"><span>Subtotal:</span><span id="preview-sub">R0.00</span></div>
          <div style="display: flex; justify-content: space-between;" id="preview-vat-line"><span>VAT @ 15%:</span><span id="preview-vat">R0.00</span></div>
          <div style="display: flex; justify-content: space-between; font-weight: bold; margin-top: 4px;"><span>TOTAL DUE:</span><span id="preview-total">R0.00</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const supabase_url = 'https://blfhvkbjfhhjsnobvfct.supabase.co';
const supabase_key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsZmh2a2JqZmhoanNub2J2ZmN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE2OTQ2MDA2NzAsImV4cCI6MjAxMDAxNjY3MH0.2mCbuwJcH_1Rqkn4g5C4DZBHuMN-SQ4VqBpHe3IjQ6E';
const sb = supabase.createClient(supabase_url, supabase_key);

let currentUser = null;
let items = [];

async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { window.location.href = '/'; return; }
  currentUser = user;
  
  const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if (profile) {
    const nextNum = (profile.invoice_prefix || 'INV') + '-' + String(profile.invoice_next_number || 1).padStart(3, '0');
    document.getElementById('invoiceNumber').value = nextNum;
    document.getElementById('preview-invnum').textContent = nextNum;
  }
  
  const today = new Date();
  document.getElementById('invoiceDate').valueAsDate = today;
  const due = new Date(today);
  due.setDate(due.getDate() + 30);
  document.getElementById('dueDate').valueAsDate = due;
  
  addItem();
}

function addItem() {
  items.push({ id: Date.now(), description: '', qty: 1, price: 0 });
  renderItems();
}

function removeItem(id) {
  items = items.filter(i => i.id !== id);
  renderItems();
}

function updateItem(id, field, value) {
  const item = items.find(i => i.id === id);
  if (item) {
    item[field] = value;
    if (field === 'qty' || field === 'price') {
      item.qty = parseInt(item.qty) || 1;
      item.price = parseFloat(item.price) || 0;
    }
    renderItems();
  }
}

function renderItems() {
  const list = document.getElementById('itemsList');
  list.innerHTML = items.map(item => `
    <div class="item-row">
      <input type="text" placeholder="Description" value="${item.description || ''}" onchange="updateItem(${item.id}, 'description', this.value)">
      <input type="number" placeholder="Qty" value="${item.qty || 1}" onchange="updateItem(${item.id}, 'qty', this.value)">
      <input type="number" placeholder="Price" value="${item.price || 0}" onchange="updateItem(${item.id}, 'price', this.value)" step="0.01">
      <input type="text" value="R${((item.qty || 1) * (item.price || 0)).toLocaleString('en-ZA')}" readonly style="background: #f0f0f0;">
      <button class="btn-remove" onclick="removeItem(${item.id})">✕</button>
    </div>
  `).join('');
  updatePreview();
}

function updatePreview() {
  const clientName = document.getElementById('clientName').value || 'Client Name';
  const invoiceNum = document.getElementById('invoiceNumber').value;
  const vatStatus = document.getElementById('vatStatus').value === 'yes';
  
  document.getElementById('preview-client').textContent = clientName;
  document.getElementById('preview-invnum').textContent = invoiceNum;
  
  const subtotal = items.reduce((s, i) => s + (parseInt(i.qty || 1) * parseFloat(i.price || 0)), 0);
  const vat = vatStatus ? (subtotal * 0.15) : 0;
  const total = subtotal + vat;
  
  const fmt = n => 'R' + n.toLocaleString('en-ZA', {minimumFractionDigits: 2});
  
  document.getElementById('subtotal').textContent = fmt(subtotal);
  document.getElementById('vat').textContent = fmt(vat);
  document.getElementById('total').textContent = fmt(total);
  document.getElementById('preview-sub').textContent = fmt(subtotal);
  document.getElementById('preview-vat').textContent = fmt(vat);
  document.getElementById('preview-total').textContent = fmt(total);
  document.getElementById('preview-vat-line').style.display = vat > 0 ? 'flex' : 'none';
  
  const tbody = document.getElementById('preview-items');
  tbody.innerHTML = items.length === 0 ? '<tr><td colspan="4" style="text-align: center; color: #999; padding: 20px;">Add items</td></tr>' : items.map(i => `
    <tr><td>${i.description || 'Item'}</td><td style="text-align: center;">${i.qty || 1}</td><td style="text-align: right;">${fmt(parseFloat(i.price || 0))}</td><td style="text-align: right; font-weight: bold;">${fmt((parseInt(i.qty || 1) * parseFloat(i.price || 0)))}</td></tr>
  `).join('');
}

async function saveInvoice() {
  const clientName = document.getElementById('clientName').value.trim();
  const clientPhone = document.getElementById('clientPhone').value.trim();
  const clientEmail = document.getElementById('clientEmail').value.trim();
  const clientAddress = document.getElementById('clientAddress').value.trim();
  const invoiceNumber = document.getElementById('invoiceNumber').value.trim();
  const invoiceDate = document.getElementById('invoiceDate').value;
  const dueDate = document.getElementById('dueDate').value;
  const status = document.getElementById('status').value;
  const notes = document.getElementById('notes').value.trim();
  const vatStatus = document.getElementById('vatStatus').value === 'yes';
  
  if (!clientName || items.length === 0) { showToast('Fill in required fields', 'error'); return; }
  
  const subtotal = items.reduce((s, i) => s + (parseInt(i.qty || 1) * parseFloat(i.price || 0)), 0);
  const vatAmount = vatStatus ? (subtotal * 0.15) : 0;
  const totalAmount = subtotal + vatAmount;
  
  try {
    const { error } = await sb.from('invoices_v2').insert([{
      user_id: currentUser.id,
      invoice_number: invoiceNumber,
      client_name: clientName,
      client_email: clientEmail,
      client_phone: clientPhone,
      client_address: clientAddress,
      items,
      invoice_date: invoiceDate,
      due_date: dueDate,
      subtotal,
      vat_percent: vatStatus ? 15 : 0,
      vat_amount: vatAmount,
      total_amount: totalAmount,
      notes,
      status
    }]);
    
    if (error) throw error;
    
    const num = parseInt(invoiceNumber.split('-')[1]) + 1;
    await sb.from('profiles').update({ invoice_next_number: num }).eq('id', currentUser.id);
    
    showToast(`✅ Invoice ${invoiceNumber} saved!`, 'success');
    setTimeout(() => window.location.href = '/', 2000);
  } catch (error) {
    console.error(error);
    showToast('Error saving invoice', 'error');
  }
}

function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text('Invoice: ' + document.getElementById('invoiceNumber').value, 20, 20);
  doc.text('Client: ' + document.getElementById('clientName').value, 20, 30);
  doc.save(document.getElementById('invoiceNumber').value + '.pdf');
  showToast('PDF downloaded!', 'success');
}

function sendWhatsApp() {
  const phone = document.getElementById('clientPhone').value.replace(/[^0-9]/g, '');
  if (!phone) { showToast('Enter phone number', 'error'); return; }
  const message = `Invoice ${document.getElementById('invoiceNumber').value} due ${document.getElementById('dueDate').value}`;
  const url = `https://wa.me/27${phone.slice(-9)}?text=${encodeURIComponent(message)}`;
  window.open(url, '_blank');
}

function showToast(message, type = 'info') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

init();
</script>
</body>
</html>
