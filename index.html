<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QForge</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #111;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .loading {
      text-align: center;
    }
    .loading h2 {
      margin: 0 0 16px 0;
      font-size: 1.2rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(230, 57, 70, 0.2);
      border-top-color: #E63946;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading">
    <h2>Loading QForge...</h2>
    <div class="spinner"></div>
  </div>

  <script>
    // Initialize Supabase
    const { createClient } = supabase;
    const sb = createClient(
      'https://blfhvkbjfhhjsnobvfct.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsZmh2a2JqZmhoanNub2J2ZmN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNjA4MjIsImV4cCI6MjA5NTgzNjgyMn0.w0CUm6N52U8OIYWqrpu84QfeFUm1TYpcpTVKCxCl-YM'
    );

    // Check if user is logged in
    async function checkAuth() {
      try {
        const { data: { session } } = await sb.auth.getSession();
        
        if (session) {
          // User is logged in → send to app
          window.location.href = '/app.html';
        } else {
          // User not logged in → send to landing page
          window.location.href = '/landing.html';
        }
      } catch (error) {
        console.error('Auth check error:', error);
        // If error, default to landing page
        window.location.href = '/landing.html';
      }
    }

    // Check auth on page load
    window.addEventListener('load', checkAuth);

    // Also check immediately (don't wait for load)
    checkAuth();
  </script>
</body>
</html>
